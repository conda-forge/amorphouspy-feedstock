schema_version: 1

context:
  version: "0.5.7"
  python_min: "3.12"

recipe:
  name: amorphouspy
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/a/amorphouspy/amorphouspy-${{ version }}.tar.gz
  sha256: ac2c84c78bd5e435d60cd315e1c42aba9d4676db2b620af900c6fca7508a0a09

build:
  number: 1
  noarch: python

outputs:
  - package:
      name: amorphouspy
    build:
      noarch: python
      script: python -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - pip
        - hatchling >=1.21
      run:
        - python >=${{ python_min }}
        - ase
        - numba
        - pandas
        - pydantic
        - lammpsparser
        - networkx
        - pymatgen
        - pymcubes
        - scipy
        - lammps ==2024.08.29
    tests:
      - python:
          imports:
            - amorphouspy
          python_version:
            - ${{ python_min }}.*
            - "*"

  - package:
      name: amorphouspy-api
    build:
      noarch: python
    requirements:
      run:
        - ${{ pin_subpackage("amorphouspy", exact=true) }}
        - executorlib
        - pysqa
        - uvicorn
        - fastapi
        - mcp >=1.6.0
        - sqlalchemy
        - jinja2
    tests:
      - python:
          imports:
            - amorphouspy_api
          python_version:
            - ${{ python_min }}.*
            - "*"

about:
  homepage: https://github.com/glasagent/amorphouspy
  summary: Workflows for atomistic modeling of oxide glasses
  description: |
    A Python package for atomistic simulations of glasses. amorphouspy provides
    capabilities from generating initial structural models through running
    molecular dynamics simulations with LAMMPS, all the way to computing
    material properties and performing detailed structural analysis.
  license: Apache-2.0
  license_file: LICENSE
  documentation: https://glasagent.github.io/amorphouspy/
  repository: https://github.com/glasagent/amorphouspy

extra:
  recipe-maintainers:
    - ltalirz
